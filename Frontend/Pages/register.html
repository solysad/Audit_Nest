<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Red+Hat+Text:ital,wght@0,300..700;1,300..700&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
    <script src="script/login.js" defer></script>
    <title>Resgister</title>
</head>
<body>
    <form action="/register" method="post">
        <h1>Register</h1>
        <div class="input-group">
            <label for="email">E-mail:</label>
            <input type="text" id="email" name="email" required>
        </div>
        <div class="input-group">
            <label for="password">Senha:</label>
            <div id="box-input-svg">
                <input type="password" id="password" name="password" required maxlength="20">
                <img id="eye-visibility" src="assets/eye-visibility.svg" alt="icone de olho para ativar a visualização da senha">
            </div>
        </div>
    
        <button type="submit">Entrar</button>
         
        <p>Não tem uma conta? <a href="/register">Registrar</a></p>
    </form>
</body>
</html>
